<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japandi 風格全室設計計畫與 3D 預覽</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif; background-color: #f4f1eb; color: #5c554b; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { background-color: #e6dfd3; border-right: 4px solid #b59778; font-weight: bold; }
        .tab-inactive { hover:background-color: #eae5dc; transition: all 0.3s ease; border-right: 4px solid transparent; }
        #canvas-container { cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Sidebar / Navigation -->
    <aside class="w-full md:w-64 bg-[#faf8f5] shadow-lg z-20 flex flex-col h-auto md:h-full border-r border-[#e0dcd5]">
        <div class="p-6 border-b border-[#e0dcd5]">
            <h1 class="text-xl font-bold text-[#4a443c] mb-2">Japandi 居家設計</h1>
            <p class="text-xs text-[#8c857b]">總預算 80 萬 | 互動式空間藍圖</p>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 flex md:flex-col gap-1 px-2" id="nav-tabs">
            <!-- Tabs injected by JS -->
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Text Content Panel -->
        <div id="text-panel" class="w-full md:w-1/3 lg:w-2/5 h-1/2 md:h-full bg-[#fcfbf9] overflow-y-auto p-8 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10 scrollbar-hide">
            <div id="content-display" class="prose prose-stone max-w-none">
                <!-- Content injected by JS -->
            </div>
        </div>

        <!-- 3D Canvas / Placeholder Panel -->
        <div id="visual-panel" class="w-full md:w-2/3 lg:w-3/5 h-1/2 md:h-full relative bg-[#f4f1eb]">
            <!-- Loading -->
            <div id="loading" class="absolute inset-0 flex items-center justify-center text-[#8c857b] z-20 bg-[#f4f1eb] transition-opacity duration-500 hidden">
                <span class="animate-pulse">載入 3D 場景中...</span>
            </div>
            
            <!-- No Image Placeholder -->
            <div id="no-3d-placeholder" class="hidden absolute inset-0 flex flex-col items-center justify-center text-[#8c857b] z-10 bg-[#f4f1eb]">
                <svg class="w-16 h-16 mb-4 text-[#dcd5cc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p>此區域保留未來彈性，暫無圖面</p>
            </div>

            <!-- UI Overlay -->
            <div id="ui-overlay" class="absolute top-4 right-4 glass-panel p-4 rounded-xl shadow-sm z-10 pointer-events-none hidden md:block border border-[#e8ddcc]">
                <h3 id="ui-title" class="font-bold text-[#5c554b] mb-2 text-sm">空間導覽</h3>
                <div id="ui-legends" class="text-xs text-[#8c857b] space-y-1 mb-3"></div>
                <div id="ui-instruction" class="pt-2 border-t border-[#e0dcd5] text-[10px] text-[#a39d96]">
                    🖱️ 左鍵：旋轉 | 滾輪：縮放 | 右鍵：平移
                </div>
            </div>

            <!-- WebGL Canvas (For 3D) -->
            <canvas id="webgl-canvas" class="w-full h-full hidden"></canvas>
        </div>
    </main>

    <script>
        // --- Data Structure ---
        const designData = [
            {
                id: 'concept',
                title: '核心理念與玄關',
                icon: '⛩️',
                has3D: true,
                legends: ['⬛ 仿岩石磁磚落塵區', '⬜ 霧面米褐色懸空鞋櫃', '🟫 純橡木格柵屏風', '💡 端景平台與暖黃光源'],
                text: `
                    <h2 class="text-2xl font-bold text-[#4a443c] mb-4 border-b pb-2">設計核心理念</h2>
                    <p class="mb-6 leading-relaxed text-sm">本計畫旨在融合日本「侘寂（Wabi-sabi）」的質樸寧靜與北歐「斯堪地那維亞（Scandinavian）」的實用機能，打造出名為 <strong>Japandi</strong> 的居家風格。整體空間以溫暖的大地色系為主軸，搭配天然橡木、棉麻織品與特殊塗料，在 <strong>80 萬</strong>的裝潢預算內，為一家四口構築一個舒適、溫馨的避風港。</p>
                    
                    <h3 class="text-lg font-bold text-[#5c554b] mt-6 mb-3 flex items-center"><span class="mr-2">1.</span> 玄關落塵區 (二進式設計)</h3>
                    <ul class="space-y-3 text-sm list-disc pl-5 text-[#6b6358]">
                        <li><strong>地坪材質：</strong>鋪設帶有自然肌理的「仿岩石磁磚」，展現現代俐落感且易於清潔保養。</li>
                        <li><strong>空間界定：</strong>與室內木地板交界處採用「平緩無高低差的金屬收邊條」。</li>
                        <li><strong>收納與視覺：</strong>側邊規劃頂天的「霧面米褐色懸空鞋櫃」，右側緊密連接「純橡木格柵」，讓出入動線極其簡潔俐落，同時展現大氣通透的光影張力。</li>
                        <li><strong>氛圍營造：</strong>鞋櫃中段留設端景平台，上方點綴暖黃色光源，營造沉靜溫暖的返家儀式感。</li>
                    </ul>
                `
            },
            {
                id: 'living',
                title: '客廳與開放式書房',
                icon: '🛋️',
                has3D: true,
                legends: ['🪨 清水模電視牆', '🚪 左側懸空收納櫃', '✨ 底層連貫 LED 燈帶', '📖 後方長型書桌', '🗄️ 左開放/右門片收納牆'],
                text: `
                    <h3 class="text-xl font-bold text-[#4a443c] mb-4 border-b pb-2">2. 客廳與開放式書房 (公領域核心)</h3>
                    
                    <h4 class="font-bold text-[#5c554b] mt-4 mb-2">電視牆面與收納</h4>
                    <ul class="space-y-2 text-sm list-disc pl-5 text-[#6b6358] mb-4">
                        <li>主牆塗佈帶有細膩手作紋理的「清水模特殊漆」，沉穩襯托電視。</li>
                        <li><strong>左側規劃兩排頂天的「霧面懸空收納櫃」</strong>，大幅提升公領域收納機能。</li>
                        <li>下方配置一字型「懸空橡木電視櫃」，並以長虹玻璃或藤編門片隱藏視聽設備。</li>
                    </ul>

                    <h4 class="font-bold text-[#5c554b] mt-4 mb-2">光影層次 (重點)</h4>
                    <p class="text-sm text-[#6b6358] mb-4 bg-[#f4f1eb] p-3 rounded-lg border border-[#e8ddcc]">左側懸空收納櫃與電視櫃的<strong>底部加入一整排連貫的 LED 暖光燈帶</strong>，營造出輕盈的漂浮感。</p>

                    <h4 class="font-bold text-[#5c554b] mt-4 mb-2">沙發與軟裝</h4>
                    <p class="text-sm text-[#6b6358] mb-4">配置 260 公分長的大地色系「一字型貓抓布沙發」，搭配低矮實木茶几與輕柔透光的「棉麻紗簾」。</p>

                    <h4 class="font-bold text-[#5c554b] mt-4 mb-2">開放式閱覽區 (沙發後方)</h4>
                    <ul class="space-y-2 text-sm list-disc pl-5 text-[#6b6358]">
                        <li>捨棄上半部格柵，僅以「純粹的半高牆」界定客廳與書房，視覺無阻礙。</li>
                        <li>緊貼半高牆設立面向客廳的加長型橡木書桌。</li>
                        <li><strong>書桌後方規劃一整面收納牆 (共五排)：</strong>左側三排為「開放式橡木層架」以展示收藏與書籍；右側兩排則搭配「霧面系統門片」隱藏雜物。</li>
                    </ul>
                `
            },
            {
                id: 'kitchen',
                title: '餐廚空間',
                icon: '🍳',
                has3D: true,
                legends: ['🟫 橡木包覆一字型中島', '⬜ 淺灰石英石檯面', '💡 霧面燕麥色金屬吊燈', '🪵 垂直擺放實木餐桌'],
                text: `
                    <h3 class="text-xl font-bold text-[#4a443c] mb-4 border-b pb-2">3. 餐廚空間</h3>
                    <ul class="space-y-4 text-sm list-none text-[#6b6358]">
                        <li class="bg-white p-4 rounded-lg shadow-sm border border-[#f0ece1]">
                            <strong class="block text-[#5c554b] mb-1">廚房格局</strong>
                            維持開放式設計，以放大公領域的空間感與通透度。
                        </li>
                        <li class="bg-white p-4 rounded-lg shadow-sm border border-[#f0ece1]">
                            <strong class="block text-[#5c554b] mb-1">機能中島</strong>
                            增設「橡木包覆一字型中島」搭配淺灰石英石檯面，內側規劃抽拉層板收納電器。
                        </li>
                        <li class="bg-white p-4 rounded-lg shadow-sm border border-[#f0ece1]">
                            <strong class="block text-[#5c554b] mb-1">用餐區域</strong>
                            實木摺疊餐桌採<strong>「垂直於中島」</strong>的方式擺放，順著空間縱深延伸，讓兩側走道更寬敞流暢。
                        </li>
                        <li class="bg-white p-4 rounded-lg shadow-sm border border-[#f0ece1]">
                            <strong class="block text-[#5c554b] mb-1">照明配置</strong>
                            餐桌上方懸掛一盞「霧面燕麥色」北歐極簡金屬吊燈。
                        </li>
                    </ul>
                `
            },
            {
                id: 'bedroom',
                title: '寧靜主臥室',
                icon: '🛏️',
                has3D: true,
                legends: ['⚪ 純白明亮主牆', '🛏️ 橡木低底盤實木床', '🚪 床尾右側霧面衣櫃', '🪞 床尾左側橡木梳妝檯'],
                text: `
                    <h3 class="text-xl font-bold text-[#4a443c] mb-4 border-b pb-2">4. 主臥室 (寧靜休憩)</h3>
                    
                    <div class="space-y-4 text-sm text-[#6b6358]">
                        <div>
                            <strong class="text-[#5c554b]">色彩計畫：</strong>
                            主牆面採用乾淨的「純白色」，提升空間明亮度，並將視覺焦點保留給溫潤的木質傢俱。
                        </div>
                        <div>
                            <strong class="text-[#5c554b]">睡眠區域：</strong>
                            搭配橡木低底盤實木床架與米色系水洗棉麻床包，床頭兩側點綴散發柔和暈光的「陶瓷壁燈」。
                        </div>
                        
                        <div class="mt-6">
                            <strong class="block text-base text-[#5c554b] mb-2 pb-1 border-b border-[#e0dcd5]">收納與梳妝 (床尾最佳化動線)</strong>
                            <ul class="list-disc pl-5 space-y-2 mt-2">
                                <li><strong>霧面米灰色大衣櫃</strong>規劃於「床尾右側」，提供充足收納且不壓迫。</li>
                                <li><strong>橡木梳妝檯</strong>整合於「床尾衣櫃的左側（靠近落地窗）」，享有極佳的自然採光，並搭配無邊框圓鏡與陶瓷小吊燈。</li>
                            </ul>
                        </div>
                    </div>
                `
            },
            {
                id: 'others',
                title: '儲藏區與電器整合牆',
                icon: '📦',
                has3D: true,
                legends: ['🪵 左側木作隔間儲藏室', '🚪 中間通道門片', '☕ 右側鏤空電器櫃', '🗄️ 內部獨立層架與洞洞板'],
                text: `
                    <h3 class="text-xl font-bold text-[#4a443c] mb-4 border-b pb-2">5. 儲藏區與電器櫃整合牆面</h3>
                    <ul class="space-y-2 text-sm list-disc pl-5 text-[#6b6358] mb-8">
                        <li><strong>左側木作隔間儲藏室：</strong>利用門外深邃的畸零空間，以溫潤的木作隔出一個獨立的走入式儲藏室。隱藏門片打開後，內部空間規劃獨立層架與無底板設計，可平推入 29 吋大行李箱。</li>
                        <li><strong>通道門片：</strong>中間配置溫潤的純橡木門片，與兩側木作結合，視覺極簡。</li>
                        <li><strong>右側電器櫃：</strong>另一側規劃大地色/橡木電器櫃，中段鏤空放置微波爐與咖啡機，完整餐廚空間的機能。</li>
                    </ul>

                    <h3 class="text-xl font-bold text-[#4a443c] mb-4 border-b pb-2">6. 孩童房與其他細節</h3>
                    <ul class="space-y-2 text-sm list-disc pl-5 text-[#6b6358]">
                        <li><strong>孩童房：</strong>燕麥色牆面搭配大地色防撞地墊，保留未來彈性。</li>
                        <li>全室櫃體採「無把手設計」或隱藏式溝槽。</li>
                        <li>主要光源以 3000K~3500K 暖白光與黃光為主，大量運用 LED 燈帶間接照明。</li>
                    </ul>
                `
            }
        ];

        // --- UI Logic ---
        let currentTabId = 'concept'; 

        function initUI() {
            const navContainer = document.getElementById('nav-tabs');
            navContainer.innerHTML = '';

            designData.forEach(tab => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 text-sm rounded-r-lg mb-1 flex items-center gap-3 ${tab.id === currentTabId ? 'tab-active' : 'tab-inactive text-[#8c857b]'}`;
                btn.onclick = () => switchTab(tab.id);
                btn.innerHTML = `<span class="text-lg">${tab.icon}</span> <span class="truncate">${tab.title}</span>`;
                navContainer.appendChild(btn);
            });

            renderContent();
        }

        function switchTab(id) {
            currentTabId = id;
            initUI(); 
            renderContent();
            
            const tabData = designData.find(t => t.id === id);
            
            const webglCanvas = document.getElementById('webgl-canvas');
            const uiOverlay = document.getElementById('ui-overlay');
            const placeholder = document.getElementById('no-3d-placeholder');
            const loading = document.getElementById('loading');

            // 先隱藏所有畫布與提示
            webglCanvas.style.display = 'none';
            uiOverlay.style.display = 'none';
            placeholder.style.display = 'none';
            loading.style.display = 'none';

            if(tabData.has3D) {
                // 顯示 3D
                webglCanvas.style.display = 'block';
                uiOverlay.style.display = 'block';
                loading.style.display = 'flex';
                setTimeout(() => switch3DScene(id), 50); 
            } else {
                placeholder.style.display = 'flex';
            }
        }

        function renderContent() {
            const tabData = designData.find(t => t.id === currentTabId);
            const contentDisplay = document.getElementById('content-display');
            contentDisplay.innerHTML = tabData.text;
            document.getElementById('text-panel').scrollTop = 0;

            if(tabData.has3D) {
                document.getElementById('ui-title').innerText = tabData.title + ' 3D 模型';
                const legendsHtml = tabData.legends.map(l => `<p>${l}</p>`).join('');
                document.getElementById('ui-legends').innerHTML = legendsHtml;
            }
        }

        // --- Three.js Logic (For 3D) ---
        let scene, camera, renderer, controls;
        let animationId;
        const mats = {};

        function initThreeJS() {
            const canvas = document.getElementById('webgl-canvas');
            const visualPanel = document.getElementById('visual-panel');

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#f4f1eb');
            scene.fog = new THREE.FogExp2('#f4f1eb', 0.02);

            camera = new THREE.PerspectiveCamera(45, visualPanel.clientWidth / visualPanel.clientHeight, 0.1, 100);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(visualPanel.clientWidth, visualPanel.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 初始化材質
            mats.woodFloor = new THREE.MeshStandardMaterial({ color: '#c5b4a0', roughness: 0.7 });
            mats.stoneFloor = new THREE.MeshStandardMaterial({ color: '#9e9a96', roughness: 0.9 });
            mats.oakWood = new THREE.MeshStandardMaterial({ color: '#b59778', roughness: 0.7 });
            mats.wall = new THREE.MeshStandardMaterial({ color: '#faf8f5', roughness: 0.9 });
            mats.concreteWall = new THREE.MeshStandardMaterial({ color: '#a19f9d', roughness: 0.95 });
            mats.whiteWall = new THREE.MeshStandardMaterial({ color: '#ffffff', roughness: 0.95 }); // 新增純白牆面材質
            mats.cabinetMat = new THREE.MeshStandardMaterial({ color: '#e6dfd3', roughness: 0.8 });
            mats.greyCabinet = new THREE.MeshStandardMaterial({ color: '#eae4db', roughness: 0.8 }); 
            mats.metal = new THREE.MeshStandardMaterial({ color: '#d1c7bd', metalness: 0.6, roughness: 0.4 });
            mats.curtain = new THREE.MeshStandardMaterial({ color: '#f0ece1', roughness: 1.0, transparent: true, opacity: 0.85, side: THREE.DoubleSide });
            mats.ledStrip = new THREE.MeshStandardMaterial({ color: '#ffddaa', emissive: '#ffbba0', emissiveIntensity: 0.8 });
            mats.sofa = new THREE.MeshStandardMaterial({ color: '#d6cdbd', roughness: 1.0 });
            mats.ceramic = new THREE.MeshStandardMaterial({ color: '#f0ece1', roughness: 0.3 });
            mats.bedding = new THREE.MeshStandardMaterial({ color: '#e6ded3', roughness: 0.95 }); // 棉麻布面材質
            mats.mirror = new THREE.MeshStandardMaterial({ color: '#eeeeee', roughness: 0.1, metalness: 0.8 });
            mats.earthCabinet = new THREE.MeshStandardMaterial({ color: '#c2b5a3', roughness: 0.9 }); 
            mats.luggageMat = new THREE.MeshStandardMaterial({ color: '#4a4a4a', roughness: 0.6 }); 
            mats.pegboardMat = new THREE.MeshStandardMaterial({ color: '#d1c2b0', roughness: 0.8 }); 

            window.addEventListener('resize', onWindowResize);

            switch3DScene(currentTabId);
            animate();
        }

        function clearScene() {
            while(scene.children.length > 0){ 
                const object = scene.children[0];
                scene.remove(object); 
            }
            scene.fog = new THREE.FogExp2('#f4f1eb', 0.03);
        }

        function setupBasicLighting() {
            const ambientLight = new THREE.AmbientLight('#ffffff', 0.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight('#fff5e6', 0.7);
            dirLight.position.set(4, 6, 3);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);
        }

        function switch3DScene(id) {
            if(!designData.find(t => t.id === id)?.has3D) return;
            
            clearScene();
            setupBasicLighting();

            if (id === 'concept') buildEntryway();
            else if (id === 'living') buildLivingRoom();
            else if (id === 'kitchen') buildKitchen();
            else if (id === 'bedroom') buildMasterBedroom();
            else if (id === 'others') buildStorageRoom();

            controls.update();
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 200);
        }

        // --- Scene Builders (3D) ---
        function buildEntryway() {
            camera.position.set(2.5, 2.5, 4.5);
            controls.target.set(0, 1, 0);

            const entrywayFloor = new THREE.Mesh(new THREE.PlaneGeometry(3, 2), mats.stoneFloor);
            entrywayFloor.rotation.x = -Math.PI / 2;
            entrywayFloor.position.set(0, 0, 1);
            entrywayFloor.receiveShadow = true;
            scene.add(entrywayFloor);

            const indoorFloor = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), mats.woodFloor);

        function onWindowResize() {
            const visualPanel = document.getElementById('visual-panel');
            if (camera && renderer) {
                camera.aspect = visualPanel.clientWidth / visualPanel.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(visualPanel.clientWidth, visualPanel.clientHeight);
            }
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            if(controls && document.getElementById('webgl-canvas').style.display !== 'none') {
                controls.update();
                if(renderer && scene && camera) renderer.render(scene, camera);
            }
        }

            initUI();
